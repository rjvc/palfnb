<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha - Gestão F&B</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-white">
  <div x-data="app()" class="max-w-6xl mx-auto p-4">
    <header class="flex justify-between items-center mb-6">
      <h1 class="text-3xl font-bold text-orange-400">👨‍🍳 Cozinha</h1>
      <span class="text-sm text-gray-400" x-text="pedidos.length + ' pedidos pendentes'"></span>
    </header>

    <div x-show="pedidos.length === 0" class="text-center py-20">
      <p class="text-4xl mb-2">✅</p>
      <p class="text-xl text-gray-400">Nenhum pedido pendente</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
      <template x-for="p in pedidos" :key="p.id">
        <div class="bg-gray-800 rounded-xl p-4 border-l-4"
          :class="p.status === 'pendente' ? 'border-orange-500' : 'border-green-500'">
          <div class="flex justify-between items-start mb-2">
            <div>
              <span class="text-sm text-gray-400">Mesa</span>
              <span class="text-2xl font-bold ml-1" x-text="p.mesa"></span>
            </div>
            <span class="text-xs px-2 py-1 rounded-full"
              :class="p.status === 'pendente' ? 'bg-orange-500/20 text-orange-300' : 'bg-green-500/20 text-green-300'"
              x-text="p.status"></span>
          </div>
          <div x-show="p.cliente" class="text-sm text-gray-400 mb-2" x-text="'Cliente: ' + p.cliente"></div>
          <div x-show="p.observacoes" class="text-sm text-yellow-300 mb-2" x-text="'📝 ' + p.observacoes"></div>
          <div class="border-t border-gray-700 pt-2 mt-2">
            <template x-for="item in p.items" :key="item.id">
              <div class="flex justify-between text-sm py-1">
                <span><span class="text-orange-400 font-bold" x-text="item.quantidade + 'x'"></span> <span x-text="item.produto_nome"></span></span>
              </div>
            </template>
          </div>
          <div class="text-xs text-gray-500 mt-2" x-text="new Date(p.criado_em).toLocaleString('pt-PT')"></div>
          <button x-show="p.status === 'pendente'"
            @click="pronto(p.id)" class="w-full mt-3 bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg font-bold transition">
            ✅ Marcar Pronto
          </button>
        </div>
      </template>
    </div>
  </div>

  <script>
    function app() {
      return {
        pedidos: [],
        ws: null,
        async init() {
          await this.carregar();
          this.conectarWS();
        },
        async carregar() {
          const r = await fetch('/api/orders?status=pendente');
          this.pedidos = await r.json();
        },
        conectarWS() {
          const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
          this.ws = new WebSocket(proto + '//' + location.host + '/ws/cozinha');
          this.ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.tipo === 'novo_pedido') {
              this.pedidos.unshift(msg.pedido);
              this.notificar(msg.pedido);
            } else if (msg.tipo === 'status_pedido') {
              this.pedidos = this.pedidos.filter(p => p.id !== msg.pedido_id);
            }
          };
          this.ws.onclose = () => setTimeout(() => this.conectarWS(), 2000);
        },
        notificar(pedido) {
          if ('Notification' in window && Notification.permission === 'granted') {
            new Notification('Novo Pedido - Mesa ' + pedido.mesa, { body: pedido.items.map(i => i.produto_nome).join(', ') });
          }
        },
        async pronto(id) {
          await fetch('/api/orders/' + id + '/status', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ status: 'pronto' })
          });
        }
      };
    }
  </script>
</body>
</html>
