<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 800px;
    font-family: 'Open Sans', sans-serif;
    background: linear-gradient(135deg, #1B365D 0%, #1a1a2e 100%);
    color: #FFFFFF;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .top-bar { height: 6px; background: linear-gradient(90deg, #C8963E, #88B7A1, #C1663B); }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 40px 0 40px;
  }
  .logo-text { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 600; color: #C8963E; letter-spacing: 2px; text-transform: uppercase; }
  .badge { font-size: 11px; background: rgba(200,150,62,0.15); color: #C8963E; padding: 6px 14px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-weight: 600; }
  .main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px 60px; text-align: center;
  }
  .overline { font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 600; color: #88B7A1; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
  .title {
    font-family: 'Montserrat', sans-serif; font-size: 72px; font-weight: 700;
    line-height: 1.1; margin-bottom: 8px;
  }
  .title .highlight { color: #C8963E; }
  .divider { width: 120px; height: 3px; background: #C8963E; margin: 24px auto; }
  .subtitle {
    font-size: 22px; font-weight: 400; color: #d0d0d0;
    line-height: 1.4; max-width: 700px; margin-bottom: 32px;
  }
  .features {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px 40px; max-width: 600px; margin: 0 auto;
  }
  .feature {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 600; color: #e0e0e0;
  }
  .feature span { color: #C8963E; font-size: 18px; }
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-top: 1px solid rgba(255,255,255,0.1);
  }
  .footer-info { font-size: 12px; color: #888; }
  .footer-info strong { color: #C8963E; }
  .hashtag { font-size: 13px; color: #88B7A1; font-weight: 600; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="header">
  <span class="logo-text">Grupo Castro Consultorias</span>
  <span class="badge">PALESTRA EXCLUSIVA</span>
</div>
<div class="main">
  <div class="overline">Food &amp; Beverage</div>
  <div class="title">F&amp;B <span class="highlight">4.0</span></div>
  <div class="divider"></div>
  <div class="subtitle">
    A gestão do seu negócio<br>nunca mais será a mesma
  </div>
  <div class="features">
    <div class="feature"><span>&#9679;</span> Custos</div>
    <div class="feature"><span>&#9679;</span> Inventário</div>
    <div class="feature"><span>&#9679;</span> Atendimento</div>
    <div class="feature"><span>&#9679;</span> Rentabilidade</div>
  </div>
</div>
<div class="footer">
  <div class="footer-info">
    <strong>10 Setembro 2026</strong> &bull; Morro Bento Business Center &bull; 09:00
  </div>
  <div class="hashtag">#F&B4ponto0</div>
</div>
</body>
</html>
